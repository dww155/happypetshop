<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login - Pet Shop</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .login-card { animation: fadeIn 0.4s ease-out; }
  </style>
</head>
<body class="h-full bg-amber-50 flex items-center justify-center min-h-screen">
  <div class="absolute text-7xl opacity-10 top-10 left-10">🐾</div>
  <div class="absolute text-7xl opacity-10 bottom-20 right-20">🐾</div>
  <div class="absolute text-6xl opacity-10 top-1/2 left-1/4">🐾</div>

  <div class="login-card w-full max-w-md mx-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <span class="text-4xl">🐾</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Pawsome Pet Shop</h1>
        <p class="text-orange-600 font-semibold mt-2">Staff Login</p>
        <p class="text-gray-500 text-sm mt-1">Sign in to access the cashier screen</p>
      </div>

      <form id="login-form" class="space-y-5" onsubmit="handleLogin(event)">
        <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm"></div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 outline-none transition">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
          <div class="relative">
            <input type="password" id="password" name="password" placeholder="Enter your password"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 outline-none transition pr-12">
            <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>
              <i data-lucide="eye-off" id="eye-off-icon" class="w-5 h-5 hidden"></i>
            </button>
          </div>
        </div>

        <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
          <input type="checkbox" id="remember" class="w-4 h-4 text-orange-600 rounded focus:ring-orange-400">
          Remember me
        </label>

        <button type="submit" id="submit-btn"
          class="w-full py-3 rounded-xl font-semibold text-white bg-orange-600 hover:bg-orange-700 transition flex items-center justify-center gap-2">
          <i data-lucide="log-in" class="w-5 h-5"></i>
          Sign In
        </button>
      </form>

      <p class="text-center text-xs text-gray-400 mt-6">© 2026 Pawsome Pet Shop</p>
    </div>
  </div>

  <script>
    // Demo credentials (replace with real auth in production)
    const DEMO_USER = 'staff';
    const DEMO_PASS = '123456';

    function togglePassword() {
      const pwd = document.getElementById('password');
      const eye = document.getElementById('eye-icon');
      const eyeOff = document.getElementById('eye-off-icon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        eye.classList.add('hidden');
        eyeOff.classList.remove('hidden');
      } else {
        pwd.type = 'password';
        eye.classList.remove('hidden');
        eyeOff.classList.add('hidden');
      }
      lucide.createIcons();
    }

    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');

      errorEl.classList.add('hidden');

      if (!username || !password) {
        errorEl.textContent = 'Please enter username and password';
        errorEl.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Signing in...';
      lucide.createIcons();

      // Simulate auth delay
      setTimeout(() => {
        if (username === DEMO_USER && password === DEMO_PASS) {
          sessionStorage.setItem('staffUser', username);
          if (document.getElementById('remember').checked) {
            localStorage.setItem('staffUser', username);
          }
          window.location.href = 'cashier.html';
        } else {
          errorEl.textContent = 'Invalid username or password';
          errorEl.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i data-lucide="log-in" class="w-5 h-5"></i> Sign In';
          lucide.createIcons();
        }
      }, 600);
    }

    lucide.createIcons();
  </script>
</body>
</html>
